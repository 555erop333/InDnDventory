    <title>D&D Inventory Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              dnd: {
                dark: '#1a1b26',
                panel: '#24283b',
                accent: '#7aa2f7',
                gold: '#e0af68',
                danger: '#f7768e',
                success: '#9ece6a',
                text: '#c0caf5',
                muted: '#565f89'
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'crumble': 'crumble 0.7s ease-in-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }

    <style>
      /* Custom Scrollbar for that 'fantasy UI' feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1b26; 
      }
      ::-webkit-scrollbar-thumb {
        background: #565f89; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #7aa2f7; 
      }

      /* Crumble / Disintegrate Animation */
      @keyframes crumble {
        0% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
          filter: contrast(100%) blur(0px);
          max-height: 500px;
          margin-bottom: 0.5rem;
        }
        20% {
          opacity: 0.8;
          transform: scale(0.98) rotate(-1deg);
          filter: contrast(150%) sepia(100%) blur(0px); /* Flash/Burn effect */
        }
        50% {
          opacity: 0.5;
          transform: scale(0.95) rotate(1deg);
          filter: grayscale(100%) blur(2px); /* Turn to ash */
        }
        100% {
          opacity: 0;
          transform: scale(0.8) translateY(20px);
          filter: grayscale(100%) blur(8px); /* Dust away */
          max-height: 0;
          margin-bottom: 0;
          padding-top: 0;
          padding-bottom: 0;
          border: none;
        }
      }
    </style>
